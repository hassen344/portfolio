version: '3.8'

services:
  frontend:
    image: node:24-alpine
    container_name: portfolio_frontend
    working_dir: /app
    volumes:
      - ./front:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - portfolio_net

  backend:
    image: node:24-alpine
    container_name: portfolio_backend
    working_dir: /app
    volumes:
      - ./back:/app
    ports:
      - "5000:5000"
    env_file:
      - ./back/.env
    command: sh -c "npm install && node server.js"
    networks:
      - portfolio_net

networks:
  portfolio_net:
    driver: bridge